name: Test and Lint

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --group dev

    - name: Lint
      run: uv run ruff check picobrew_server

    - name: Check formatting
      run: uv run ruff format --check picobrew_server

    - name: Type check
      run: uv run ty check picobrew_server

    - name: Test
      run: uv run pytest
